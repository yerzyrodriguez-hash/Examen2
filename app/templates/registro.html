<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Registro - Biblioteca</title>
</head>
<body class="bg-light d-flex align-items-center min-vh-100 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm rounded-4 border-0">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4 fw-bold text-success">📝 Nuevo Lector</h3>
                        
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <form method="POST">
                            <h6 class="text-muted mb-3">Datos Personales</h6>
                            <div class="mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" class="form-control" name="nombre" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Cédula de Identidad (C.I.)</label>
                                    <input type="text" class="form-control" name="c_i" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Celular</label>
                                    <input type="text" class="form-control" name="celular">
                                </div>
                            </div>
                            
                            <hr class="my-4">
                            
                            <h6 class="text-muted mb-3">Datos de Acceso</h6>
                            <div class="mb-3">
                                <label class="form-label">Nombre de Usuario</label>
                                <input type="text" class="form-control" name="username" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Contraseña</label>
                                <input type="password" class="form-control" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">Registrar Cuenta</button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <a href="{{ url_for('auth.lista_usuarios') }}" class="text-decoration-none text-secondary">Volver</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
