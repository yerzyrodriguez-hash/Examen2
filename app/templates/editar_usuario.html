<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Editar Usuario - Biblioteca</title>
</head>
<body class="bg-light d-flex align-items-center min-vh-100 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm rounded-4 border-0">
                    <div class="card-body p-5">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h3 class="fw-bold text-primary mb-0">✏️ Editar Usuario</h3>
                            <a href="{{ url_for('auth.lista_usuarios') }}" class="btn btn-outline-secondary btn-sm">Volver</a>
                        </div>

                        <form method="POST">
                            <h6 class="text-muted mb-3">Datos Personales</h6>
                            <div class="mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" class="form-control" name="nombre" value="{{ usuario.perfil.nombre }}" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Cédula de Identidad (C.I.)</label>
                                    <input type="text" class="form-control" name="c_i" value="{{ usuario.perfil.C_I }}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Celular</label>
                                    <input type="text" class="form-control" name="celular" value="{{ usuario.perfil.celular or '' }}">
                                </div>
                            </div>
                            
                            <hr class="my-4">
                            
                            <h6 class="text-muted mb-3">Datos de Acceso</h6>
                            <div class="mb-3">
                                <label class="form-label">Nombre de Usuario</label>
                                <input type="text" class="form-control" name="username" value="{{ usuario.username }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Rol en el Sistema</label>
                                <select class="form-select" name="rol" required>
                                    <option value="lector" {% if usuario.role == 'lector' %}selected{% endif %}>Lector</option>
                                    <option value="admin" {% if usuario.role == 'admin' %}selected{% endif %}>Administrador</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Nueva Contraseña <small class="text-muted">(Dejar en blanco para no cambiarla)</small></label>
                                <input type="password" class="form-control" name="password">
                            </div>
                            
                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Guardar Cambios</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
