<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ accion }} Libro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4" style="max-width: 560px;">

    <h2>{{ accion }} Libro</h2>
    <hr>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST">

        <!-- Título -->
        <div class="mb-3">
            <label for="titulo" class="form-label fw-bold">Título <span class="text-danger">*</span></label>
            <input type="text" id="titulo" name="titulo" class="form-control"
                   value="{{ libro.titulo if libro else '' }}" required>
        </div>

        <!-- Autor -->
        <div class="mb-3">
            <label for="autor" class="form-label fw-bold">Autor <span class="text-danger">*</span></label>
            <input type="text" id="autor" name="autor" class="form-control"
                   value="{{ libro.autor if libro else '' }}" required>
        </div>

        <!-- Stock -->
        <div class="mb-3">
            <label for="stock" class="form-label fw-bold">Stock <span class="text-danger">*</span></label>
            <input type="number" id="stock" name="stock" class="form-control" min="0"
                   value="{{ libro.stock if libro else 0 }}" required>
            <div class="form-text">Cantidad de ejemplares disponibles (mínimo 0).</div>
        </div>

        <!-- Categoría -->
        <div class="mb-4">
            <label for="categoria_id" class="form-label fw-bold">Categoría <span class="text-danger">*</span></label>
            <select id="categoria_id" name="categoria_id" class="form-select" required>
                <option value="">— Selecciona una categoría —</option>
                {% for cat in categorias %}
                    <option value="{{ cat.id }}"
                        {% if libro and libro.categoria_id == cat.id %}selected{% endif %}>
                        {{ cat.nombre }}
                    </option>
                {% endfor %}
            </select>
            {% if current_user.role == 'admin' %}
                <div class="form-text">
                    ¿No aparece la categoría?
                    <a href="{{ url_for('inventario.nueva_categoria') }}">Créala aquí</a>.
                </div>
            {% endif %}
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">{{ accion }}</button>
            <a href="{{ url_for('inventario.catalogo') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
