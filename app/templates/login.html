<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login - Biblioteca</title>
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm rounded-4 border-0">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4 fw-bold text-primary">📚 Biblioteca</h3>
                        
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label text-secondary fw-semibold">Usuario</label>
                                <input type="text" class="form-control form-control-lg bg-light" name="username" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-secondary fw-semibold">Contraseña</label>
                                <input type="password" class="form-control form-control-lg bg-light" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Ingresar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
