<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ accion }} Categoría</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4" style="max-width: 440px;">

    <h2>🗂️ {{ accion }} Categoría</h2>
    <hr>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label for="nombre" class="form-label fw-bold">Nombre <span class="text-danger">*</span></label>
            <input type="text" id="nombre" name="nombre" class="form-control"
                   value="{{ categoria.nombre if categoria else '' }}"
                   placeholder="Ej. Ficción, Ciencias, Historia…" required>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">{{ accion }}</button>
            <a href="{{ url_for('inventario.lista_categorias') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
